<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduPath — Print</title>
  <link rel="icon" href="assets/logo-mark.svg">
  <link rel="stylesheet" href="kit.css">
  <link rel="stylesheet" href="print.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="EduPath Print">
  <div id="root"></div>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens-public.jsx"></script>
  <script type="text/babel" src="screens-student.jsx"></script>
  <script type="text/babel" src="screens-admin.jsx"></script>
  <script type="text/babel" src="screens-real.jsx"></script>
  <script type="text/babel" src="app-print.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    (async () => {
      try { await document.fonts.ready; } catch (e) {}
      await new Promise(r => setTimeout(r, 1500));
      window.print();
    })();
  </script>
</body>
</html>
